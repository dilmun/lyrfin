name: Release Build

# Reusable workflow: build the release binaries for every target and attach them
# to an already-created GitHub Release. Called by release.yml on every vX.Y.Z tag
# (the release-please tag or a manual hotfix tag), so the build matrix lives in
# exactly one place. See docs/RELEASING.md.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build and attach binaries to (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install ALSA (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin=lyrfin
          [ "${{ runner.os }}" = "Windows" ] && bin=lyrfin.exe
          archive=lyrfin-${{ matrix.target }}.tar.gz
          tar czf "$archive" -C target/${{ matrix.target }}/release "$bin"
          # SHA-256 checksum so users can verify the download. The tool differs by
          # runner: macOS ships `shasum` (no `sha256sum`), Windows Git Bash ships
          # `sha256sum` (no `shasum`), Linux has both — so prefer `shasum` and fall
          # back to `sha256sum`. Both emit the same `<hash>  <file>` line, so either
          # file stays verifiable with `shasum -a 256 -c` (or `sha256sum -c`).
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" > "$archive.sha256"
          else
            sha256sum "$archive" > "$archive.sha256"
          fi
      - name: Attach to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          archive=lyrfin-${{ matrix.target }}.tar.gz
          gh release upload "${{ inputs.tag }}" "$archive" "$archive.sha256" --clobber
